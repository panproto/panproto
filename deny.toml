[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # paste is unmaintained (RUSTSEC-2024-0436) but is a transitive dep of
    # nickel-lang-core used only at Nickel evaluation time (not in hot paths).
    # No security impact; will be resolved when nickel-lang updates.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDLA-Permissive-2.0",
    # malachite crates are transitive deps of nickel-lang (arbitrary-precision
    # arithmetic in the Nickel evaluator). Dynamically linked per Rust default.
    "LGPL-3.0-only",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[[bans.skip]]
crate = "panproto-integration-tests"
reason = "internal test crate, publish = false"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
