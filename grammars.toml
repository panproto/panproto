# Tree-sitter grammar manifest for panproto.
#
# Each entry defines a language grammar with:
#   repo        = GitHub repository URL
#   extensions  = file extensions this grammar handles (empty for injection grammars)
#   c_symbol    = C function suffix: tree_sitter_{c_symbol}() (defaults to TOML key)
#   directory   = subdirectory within repo for multi-grammar repos (optional)
#
# The tools/fetch-grammars.py script reads this file and populates grammars/{lang}/src/
# with parser.c, scanner.c/scanner.cc (if present), node-types.json, and tree_sitter/parser.h.

