[package]
name = "panproto-parse"
description = "Tree-sitter full-AST parsers and emitters for panproto language protocols"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
panproto-gat = { workspace = true }
panproto-schema = { workspace = true }
panproto-protocols = { workspace = true }

tree-sitter = { workspace = true }
tree-sitter-typescript = { workspace = true }
tree-sitter-python = { workspace = true }
tree-sitter-rust = { workspace = true }
tree-sitter-java = { workspace = true }
tree-sitter-go = { workspace = true }
tree-sitter-swift = { workspace = true }
# tree-sitter-kotlin omitted: 0.3.x depends on tree-sitter 0.20 which causes
# duplicate symbol errors in cdylib targets. Kotlin node-types.json is embedded
# directly in src/languages/kotlin-node-types.json for theory extraction.
tree-sitter-c-sharp = { workspace = true }
tree-sitter-c = { workspace = true }
tree-sitter-cpp = { workspace = true }

tree-sitter-language = "0.1"

serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
miette = { workspace = true }
rustc-hash = { workspace = true }
smallvec = { workspace = true }
memchr = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }

[lints]
workspace = true
