project:
  type: book
  output-dir: _site

book:
  title: "panproto: Schematic Version Control"
  subtitle: "A Practitioner's Guide to Protocol-Parametric Data Evolution"
  author:
    - name: "Aaron Steven White"
      url: "https://github.com/aaronstevenwhite"
  date: today
  date-format: "MMMM YYYY"
  repo-url: "https://github.com/panproto/panproto"
  repo-subdir: tutorial
  repo-actions: [edit, issue]
  # Source lives in panproto/panproto repo at tutorial/.
  # Built HTML is pushed to panproto/tutorial repo for GitHub Pages.
  site-url: "https://panproto.dev/tutorial/"
  sidebar:
    style: floating
    collapse-level: 2
  search: true
  chapters:
    - index.qmd
    - part: "The Problem"
      chapters:
        - chapters/01-the-schema-migration-problem.qmd
    - part: "Foundations"
      chapters:
        - chapters/02-what-schemas-have-in-common.qmd
        - chapters/03-protocols-as-parameters.qmd
    - part: "Migration"
      chapters:
        - chapters/04-your-first-migration.qmd
        - chapters/05-when-migrations-break.qmd
        - chapters/06-bidirectional-migration-with-lenses.qmd
        - chapters/07-breaking-changes-and-ci.qmd
    - part: "The Toolkit"
      chapters:
        - chapters/08-lifting-data.qmd
        - chapters/09-building-your-own-protocol.qmd
        - chapters/10-schema-version-control.qmd
        - chapters/11-cross-protocol-translation.qmd
    - part: "Advanced Topics"
      chapters:
        - chapters/12-names-across-protocol-boundaries.qmd
        - chapters/13-automatic-migration-discovery.qmd
        - chapters/14-self-description-and-building-blocks.qmd
        - chapters/15-testing-and-simplification.qmd
    - part: "Automated Lenses"
      chapters:
        - chapters/16-protolenses.qmd
        - chapters/17-automatic-lens-generation.qmd
        - chapters/18-symmetric-lenses.qmd
    - part: "Data Versioning"
      chapters:
        - chapters/19-data-versioning.qmd
        - chapters/20-value-dependent-transforms.qmd
        - chapters/21-querying-instances.qmd
    - part: "Appendices"
      chapters:
        - appendices/A-formal-foundations.qmd
        - appendices/B-api-reference.qmd
        - appendices/C-protocol-catalog.qmd

bibliography: references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/chicago-author-date.csl
link-citations: true
citations-hover: true

filters:
  - include-code-files

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: false
    code-tools: true
    code-copy: true
    highlight-style: github
    mermaid:
      theme: neutral

execute:
  freeze: auto
